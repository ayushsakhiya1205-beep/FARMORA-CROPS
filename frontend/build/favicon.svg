<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#114714;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5e1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e076;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8962e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background with dark green -->
  <circle cx="50" cy="50" r="48" fill="url(#greenGradient)" stroke="#0b3d2e" stroke-width="1"/>
  
  <!-- Simplified wheat stalk on left side -->
  <path d="M 22 65 Q 25 50, 30 35 Q 32 25, 35 15" 
        stroke="url(#goldGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="35" cy="15" r="2.5" fill="url(#goldGradient)"/>
  <path d="M 28 30 L 26 25 L 24 27" stroke="url(#goldGradient)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 30 40 L 28 35 L 26 37" stroke="url(#goldGradient)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  
  <!-- FARMORA text (simplified for small size) -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="22" font-weight="bold" 
        text-anchor="middle" fill="url(#goldGradient)" letter-spacing="1">FARMORA</text>
  
  <!-- crops text below -->
  <text x="50" y="75" font-family="Arial, sans-serif" font-size="9" 
        text-anchor="middle" fill="url(#goldGradient)" letter-spacing="0.5">crops</text>
  
  <!-- Leaf inside O (simplified) -->
  <ellipse cx="65" cy="58" rx="3" ry="5" fill="url(#goldGradient)" transform="rotate(-30 65 58)"/>
</svg>
